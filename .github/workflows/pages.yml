name: Publish Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Verify source syntax
        run: npm run check

      - name: Run test suite
        run: npm test

      - name: Build Pages artifact
        run: npm run pages:build
        env:
          COMMIT_CANVAS_USERNAME: TrueNix
          COMMIT_CANVAS_TOKEN: ${{ secrets.COMMIT_CANVAS_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
          COMMIT_CANVAS_CNAME: ${{ vars.COMMIT_CANVAS_CNAME }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./docs

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
